name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"  # roda todos os dias à meia-noite (UTC)
  workflow_dispatch:      # permite rodar manualmente pela aba Actions
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake game from contribution grid
        uses: Platane/snk@v3
        with:
          github_user_name: bsilvacs1
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Push snake output to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
